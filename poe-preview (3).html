<meta charset="UTF-8">

<title>Lucky Spinner</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&amp;family=Nunito:wght@700;900&amp;display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2f5;
    --text: #222;
    --card-bg: #ffffff;
    --shadow: rgba(0,0,0,0.12);
    --btn-gradient: linear-gradient(135deg, #ff6b6b, #ee5a24);
    --btn-hover: linear-gradient(135deg, #ee5a24, #ff6b6b);
    --result-bg: rgba(255,255,255,0.95);
    --overlay-bg: rgba(0,0,0,0.4);
  }
  html.dark {
    --bg: #1a1a2e;
    --text: #e0e0e0;
    --card-bg: #16213e;
    --shadow: rgba(0,0,0,0.4);
    --btn-gradient: linear-gradient(135deg, #e94560, #c23616);
    --btn-hover: linear-gradient(135deg, #c23616, #e94560);
    --result-bg: rgba(22,33,62,0.97);
    --overlay-bg: rgba(0,0,0,0.6);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    padding: 20px;
    transition: background 0.3s;
  }
  h1 {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    margin-bottom: 10px;
    background: linear-gradient(135deg, #ff6b6b, #ffa502, #2ed573, #1e90ff, #a55eea);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    letter-spacing: 1px;
    animation: titlePulse 3s ease-in-out infinite;
  }
  @keyframes titlePulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }
  .subtitle {
    font-size: clamp(0.85rem, 2.5vw, 1rem);
    opacity: 0.6;
    margin-bottom: 20px;
    text-align: center;
  }
  .spinner-container {
    position: relative;
    width: clamp(300px, 80vw, 460px);
    height: clamp(300px, 80vw, 460px);
    margin: 0 auto;
  }
  .wheel-wrapper {
    position: relative;
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 8px 24px var(--shadow));
  }
  canvas#wheel {
    width: 100%;
    height: 100%;
    transition: filter 0.3s;
  }
  /* Pointer triangle at top */
  .pointer {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-top: 32px solid #222;
    z-index: 10;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.3));
    transition: border-top-color 0.3s;
  }
  html.dark .pointer {
    border-top-color: #e0e0e0;
  }
  /* Center button */
  .center-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: clamp(70px, 18vw, 100px);
    height: clamp(70px, 18vw, 100px);
    border-radius: 50%;
    background: var(--btn-gradient);
    border: 4px solid #fff;
    color: #fff;
    font-family: 'Baloo 2', cursive;
    font-size: clamp(1rem, 3vw, 1.4rem);
    cursor: pointer;
    z-index: 20;
    box-shadow: 0 4px 16px rgba(238,90,36,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: 1px;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .center-btn:hover {
    background: var(--btn-hover);
    transform: translate(-50%, -50%) scale(1.08);
    box-shadow: 0 6px 24px rgba(238,90,36,0.55);
  }
  .center-btn:active {
    transform: translate(-50%, -50%) scale(0.96);
  }
  .center-btn.disabled {
    opacity: 0.6;
    cursor: not-allowed;
    pointer-events: none;
  }
  /* Items editor */
  .editor-section {
    width: clamp(300px, 80vw, 460px);
    margin-top: 28px;
    background: var(--card-bg);
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 4px 16px var(--shadow);
  }
  .editor-section h2 {
    font-family: 'Baloo 2', cursive;
    font-size: 1.2rem;
    margin-bottom: 12px;
    opacity: 0.85;
  }
  .items-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 14px;
    max-height: 200px;
    overflow-y: auto;
  }
  .item-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .item-color {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 2px solid rgba(0,0,0,0.1);
  }
  .item-input {
    flex: 1;
    padding: 8px 12px;
    border: 2px solid rgba(0,0,0,0.1);
    border-radius: 10px;
    font-size: 16px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .item-input:focus {
    border-color: #1e90ff;
  }
  .item-remove {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: #ff4757;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, opacity 0.15s;
  }
  .item-remove:hover {
    transform: scale(1.1);
  }
  .add-btn {
    width: 100%;
    padding: 10px;
    border: 2px dashed rgba(0,0,0,0.2);
    border-radius: 10px;
    background: transparent;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    opacity: 0.6;
    transition: opacity 0.2s, border-color 0.2s;
  }
  .add-btn:hover {
    opacity: 1;
    border-color: #1e90ff;
  }
  /* Result modal overlay */
  .result-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: var(--overlay-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.4s, visibility 0.4s;
    padding: 20px;
  }
  .result-overlay.show {
    opacity: 1;
    visibility: visible;
  }
  .result-card {
    background: var(--result-bg);
    border-radius: 24px;
    padding: 36px 28px;
    text-align: center;
    max-width: 360px;
    width: 100%;
    transform: scale(0.8);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .result-overlay.show .result-card {
    transform: scale(1);
  }
  .result-emoji {
    font-size: 3.5rem;
    margin-bottom: 12px;
    animation: bounce 0.6s ease-in-out infinite alternate;
  }
  @keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-10px); }
  }
  .result-label {
    font-size: 0.95rem;
    opacity: 0.5;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .result-text {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(1.6rem, 5vw, 2.2rem);
    margin-bottom: 24px;
    word-break: break-word;
  }
  .result-close {
    padding: 12px 36px;
    border: none;
    border-radius: 12px;
    background: var(--btn-gradient);
    color: #fff;
    font-family: 'Baloo 2', cursive;
    font-size: 1.1rem;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .result-close:hover {
    transform: scale(1.05);
  }
  /* Confetti canvas */
  #confetti {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 99;
  }
  /* Spin history */
  .history-section {
    width: clamp(300px, 80vw, 460px);
    margin-top: 16px;
    background: var(--card-bg);
    border-radius: 16px;
    padding: 16px 20px;
    box-shadow: 0 4px 16px var(--shadow);
  }
  .history-section h3 {
    font-family: 'Baloo 2', cursive;
    font-size: 1rem;
    margin-bottom: 8px;
    opacity: 0.7;
  }
  .history-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .history-chip {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 700;
    color: #fff;
    animation: chipIn 0.3s ease-out;
  }
  @keyframes chipIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<h1>🎡 Lucky Spinner</h1>
<p class="subtitle">Tap SPIN and let fate decide!</p>

<div class="spinner-container">
  <div class="wheel-wrapper">
    <div class="pointer"></div>
    <canvas id="wheel" width="920" height="920"></canvas>
    <button class="center-btn" id="spinBtn">SPIN</button>
  </div>
</div>

<div class="editor-section">
  <h2>✏️ Edit Items</h2>
  <div class="items-list" id="itemsList"></div>
  <button class="add-btn" id="addBtn">+ Add Item</button>
</div>

<div class="history-section" id="historySection" style="display:none;">
  <h3>📜 Recent Results</h3>
  <div class="history-list" id="historyList"></div>
</div>

<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <div class="result-emoji">🎉</div>
    <div class="result-label">Winner</div>
    <div class="result-text" id="resultText"></div>
    <button class="result-close" id="resultClose">Awesome!</button>
  </div>
</div>

<canvas id="confetti"></canvas>

<script>
(function() {
  // Dark mode detection
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.classList.add('dark');
  }
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(event) {
    if (event.matches) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  });

  // Segment colors matching the reference image
  var COLORS = [
    '#FF3B30', // Red - ITEM 1
    '#FF9500', // Orange - ITEM 2
    '#FFD60A', // Yellow - ITEM 3
    '#4CD964', // Green - ITEM 4
    '#5AC8FA', // Light Blue - ITEM 5
    '#7B68EE', // Purple - ITEM 6
    '#FF2D55', // Pink
    '#00C7BE', // Teal
    '#AF52DE', // Violet
    '#FF6347', // Tomato
    '#32CD32', // Lime
    '#4169E1'  // Royal Blue
  ];

  var items = ['ITEM 1', 'ITEM 2', 'ITEM 3', 'ITEM 4', 'ITEM 5', 'ITEM 6'];
  var currentRotation = 0;
  var isSpinning = false;
  var history = [];

  var canvas = document.getElementById('wheel');
  var ctx = canvas.getContext('2d');
  var spinBtn = document.getElementById('spinBtn');
  var itemsList = document.getElementById('itemsList');
  var addBtn = document.getElementById('addBtn');
  var resultOverlay = document.getElementById('resultOverlay');
  var resultText = document.getElementById('resultText');
  var resultClose = document.getElementById('resultClose');
  var historySection = document.getElementById('historySection');
  var historyList = document.getElementById('historyList');
  var confettiCanvas = document.getElementById('confetti');
  var confCtx = confettiCanvas.getContext('2d');

  function resizeConfetti() {
    confettiCanvas.width = window.innerWidth;
    confettiCanvas.height = window.innerHeight;
  }
  resizeConfetti();
  window.addEventListener('resize', resizeConfetti);

  function drawWheel() {
    var size = canvas.width;
    var cx = size / 2;
    var cy = size / 2;
    var radius = size / 2 - 12;
    var count = items.length;
    if (count === 0) return;

    ctx.clearRect(0, 0, size, size);
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(currentRotation);
    ctx.translate(-cx, -cy);

    var sliceAngle = (2 * Math.PI) / count;

    // Draw outer ring glow
    ctx.beginPath();
    ctx.arc(cx, cy, radius + 6, 0, 2 * Math.PI);
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.fill();

    for (var i = 0; i < count; i++) {
      var startAngle = i * sliceAngle - Math.PI / 2;
      var endAngle = startAngle + sliceAngle;

      // Draw slice
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, radius, startAngle, endAngle);
      ctx.closePath();
      ctx.fillStyle = COLORS[i % COLORS.length];
      ctx.fill();

      // Subtle border between slices
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Draw text
      ctx.save();
      ctx.translate(cx, cy);
      var midAngle = startAngle + sliceAngle / 2;
      ctx.rotate(midAngle);

      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold ' + Math.max(22, Math.min(44, 220 / count)) + 'px "Nunito", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(0,0,0,0.35)';
      ctx.shadowBlur = 4;
      ctx.shadowOffsetX = 1;
      ctx.shadowOffsetY = 1;

      var textRadius = radius * 0.62;
      var label = items[i];
      // Truncate long text
      if (label.length > 14) {
        label = label.substring(0, 12) + '…';
      }
      ctx.fillText(label, textRadius, 0);
      ctx.restore();
    }

    // Center circle
    var centerR = radius * 0.14;
    ctx.beginPath();
    ctx.arc(cx, cy, centerR + 4, 0, 2 * Math.PI);
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(cx, cy, centerR, 0, 2 * Math.PI);
    var grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, centerR);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(1, '#e8e8e8');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = '#ccc';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Center dot
    ctx.beginPath();
    ctx.arc(cx, cy, 8, 0, 2 * Math.PI);
    ctx.fillStyle = '#999';
    ctx.fill();

    ctx.restore();
  }

  function getWinnerIndex() {
    var count = items.length;
    if (count === 0) return -1;
    var sliceAngle = (2 * Math.PI) / count;
    // Normalize rotation: the pointer is at the top (-π/2)
    // We need to find which slice is at the top
    var normalizedAngle = ((2 * Math.PI) - (currentRotation % (2 * Math.PI))) % (2 * Math.PI);
    var index = Math.floor(normalizedAngle / sliceAngle);
    return index % count;
  }

  function spin() {
    if (isSpinning || items.length < 2) return;
    isSpinning = true;
    spinBtn.classList.add('disabled');

    // Random spin: 5-10 full rotations + random offset
    var extraRotations = (5 + Math.random() * 5) * 2 * Math.PI;
    var randomAngle = Math.random() * 2 * Math.PI;
    var targetRotation = currentRotation + extraRotations + randomAngle;

    var startTime = null;
    var duration = 4000 + Math.random() * 2000; // 4-6 seconds
    var startRotation = currentRotation;

    // Add tick sound effect using AudioContext
    var audioCtx = null;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) {
      // Audio not available
    }

    var lastTickIndex = -1;

    function playTick() {
      if (!audioCtx) return;
      try {
        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 800 + Math.random() * 400;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.05);
      } catch (e) {
        // Ignore audio errors
      }
    }

    function easeOutQuart(t) {
      return 1 - Math.pow(1 - t, 4);
    }

    function animate(timestamp) {
      if (!startTime) startTime = timestamp;
      var elapsed = timestamp - startTime;
      var progress = Math.min(elapsed / duration, 1);
      var eased = easeOutQuart(progress);

      currentRotation = startRotation + (targetRotation - startRotation) * eased;
      drawWheel();

      // Tick sound on segment change
      var currentIndex = getWinnerIndex();
      if (currentIndex !== lastTickIndex) {
        lastTickIndex = currentIndex;
        playTick();
      }

      if (progress < 1) {
        requestAnimationFrame(animate);
      } else {
        isSpinning = false;
        spinBtn.classList.remove('disabled');
        var winnerIdx = getWinnerIndex();
        if (winnerIdx >= 0 && winnerIdx < items.length) {
          showResult(items[winnerIdx], COLORS[winnerIdx % COLORS.length]);
        }
      }
    }

    requestAnimationFrame(animate);
  }

  function showResult(text, color) {
    resultText.textContent = text;
    resultText.style.color = color;
    resultOverlay.classList.add('show');
    launchConfetti();

    // Play win sound
    try {
      var audioCtx2 = new (window.AudioContext || window.webkitAudioContext)();
      var notes = [523, 659, 784, 1047];
      notes.forEach(function(freq, i) {
        var osc = audioCtx2.createOscillator();
        var gain = audioCtx2.createGain();
        osc.connect(gain);
        gain.connect(audioCtx2.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        var t = audioCtx2.currentTime + i * 0.12;
        gain.gain.setValueAtTime(0.1, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
        osc.start(t);
        osc.stop(t + 0.4);
      });
    } catch (e) {
      // Ignore
    }

    // Add to history
    history.unshift({ text: text, color: color });
    if (history.length > 20) history.pop();
    renderHistory();
  }

  function renderHistory() {
    if (history.length === 0) {
      historySection.style.display = 'none';
      return;
    }
    historySection.style.display = 'block';
    historyList.innerHTML = '';
    history.forEach(function(h) {
      var chip = document.createElement('span');
      chip.className = 'history-chip';
      chip.style.backgroundColor = h.color;
      chip.textContent = h.text;
      historyList.appendChild(chip);
    });
  }

  resultClose.addEventListener('click', function() {
    resultOverlay.classList.remove('show');
  });
  resultOverlay.addEventListener('click', function(e) {
    if (e.target === resultOverlay) {
      resultOverlay.classList.remove('show');
    }
  });

  // Confetti system
  var confettiParticles = [];
  var confettiAnimating = false;

  function launchConfetti() {
    confettiParticles = [];
    for (var i = 0; i < 150; i++) {
      confettiParticles.push({
        x: confettiCanvas.width / 2 + (Math.random() - 0.5) * 200,
        y: confettiCanvas.height / 2,
        vx: (Math.random() - 0.5) * 16,
        vy: -Math.random() * 18 - 4,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        size: Math.random() * 8 + 4,
        rotation: Math.random() * 360,
        rotSpeed: (Math.random() - 0.5) * 12,
        life: 1
      });
    }
    if (!confettiAnimating) {
      confettiAnimating = true;
      animateConfetti();
    }
  }

  function animateConfetti() {
    confCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    var alive = false;
    confettiParticles.forEach(function(p) {
      if (p.life <= 0) return;
      alive = true;
      p.x += p.vx;
      p.vy += 0.35;
      p.y += p.vy;
      p.rotation += p.rotSpeed;
      p.life -= 0.008;

      confCtx.save();
      confCtx.translate(p.x, p.y);
      confCtx.rotate((p.rotation * Math.PI) / 180);
      confCtx.globalAlpha = Math.max(0, p.life);
      confCtx.fillStyle = p.color;
      confCtx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      confCtx.restore();
    });
    if (alive) {
      requestAnimationFrame(animateConfetti);
    } else {
      confettiAnimating = false;
      confCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    }
  }

  // Item editor
  function renderItems() {
    itemsList.innerHTML = '';
    items.forEach(function(item, idx) {
      var row = document.createElement('div');
      row.className = 'item-row';

      var colorDot = document.createElement('div');
      colorDot.className = 'item-color';
      colorDot.style.backgroundColor = COLORS[idx % COLORS.length];

      var input = document.createElement('input');
      input.className = 'item-input';
      input.type = 'text';
      input.value = item;
      input.maxLength = 30;
      input.setAttribute('data-index', idx);
      input.addEventListener('change', function() {
        var i = parseInt(this.getAttribute('data-index'), 10);
        items[i] = this.value || ('Item ' + (i + 1));
        drawWheel();
      });
      input.addEventListener('blur', function() {
        var i = parseInt(this.getAttribute('data-index'), 10);
        if (!this.value.trim()) {
          this.value = 'Item ' + (i + 1);
          items[i] = this.value;
          drawWheel();
        }
      });

      var removeBtn = document.createElement('button');
      removeBtn.className = 'item-remove';
      removeBtn.innerHTML = '×';
      removeBtn.setAttribute('data-index', idx);
      removeBtn.addEventListener('click', function() {
        var i = parseInt(this.getAttribute('data-index'), 10);
        if (items.length <= 2) return; // min 2 items
        items.splice(i, 1);
        renderItems();
        drawWheel();
      });
      if (items.length <= 2) {
        removeBtn.style.opacity = '0.3';
        removeBtn.style.cursor = 'not-allowed';
      }

      row.appendChild(colorDot);
      row.appendChild(input);
      row.appendChild(removeBtn);
      itemsList.appendChild(row);
    });
  }

  addBtn.addEventListener('click', function() {
    if (items.length >= 12) return;
    items.push('Item ' + (items.length + 1));
    renderItems();
    drawWheel();
    // Focus the new input
    var inputs = itemsList.querySelectorAll('.item-input');
    if (inputs.length > 0) {
      inputs[inputs.length - 1].focus();
      inputs[inputs.length - 1].select();
    }
  });

  spinBtn.addEventListener('click', spin);

  // Initialize
  renderItems();
  drawWheel();
})();
</script>



</body></html>
